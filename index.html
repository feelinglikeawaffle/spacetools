
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Tools – Solar System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Space Tools – Solar System</h1>

    <div id="solar-system">
        <div class="planet" id="mercury"></div>
        <div class="planet" id="venus"></div>
        <div class="planet" id="earth"></div>
        <div class="planet" id="mars"></div>
        <div class="planet" id="jupiter"></div>
        <div class="planet" id="saturn"></div>
        <div class="planet" id="uranus"></div>
        <div class="planet" id="neptune"></div>
    </div>

    <div id="info-box">
        <h2 id="planet-name"></h2>
        <p><strong>Distance from Sun:</strong> <span id="dist-sun"></span> miles</p>
        <p><strong>Distance from Earth:</strong> <span id="dist-earth"></span> miles</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
